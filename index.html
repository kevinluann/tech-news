<!DOCTYPE html>
<html lang="pt-BR">

<head>
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Tech News - Portal de notícias</title>
   <link rel="stylesheet" href="styles/index.css">
   <link
      href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62..125,100..900;1,62..125,100..900&display=swap"
      rel="stylesheet">
</head>

<body>
   <header class="grid container">
      <nav id="primary" class="grid grid-column">
         <div>
            <img src="assets/icons/List.svg" alt="Ícone de Menu">
            <strong>Menu</strong>
         </div>
         <div>
            <img src="assets/icons/Logo.svg" alt="Logo Tech News">
         </div>
         <div>
            <strong>Buscar</strong>
            <img src="assets/icons/MagnifyingGlass.svg" alt="Ícone de busca">
         </div>
      </nav>
      <nav id="secondary" class="grid grid-column">
         <a href="#">Inteligência Artificial</a>
         <a href="#">Blockchain</a>
         <a href="#">Hologramas</a>
         <a href="#">Internet</a>
         <a href="#">Vestíveis</a>
         <a href="#">Realidade Aumentada</a>
         <a href="#">Realidade Virtual</a>
      </nav>
   </header>
   <main class="container">
      <section id="featured" class="grid grid-column gap-16">
         <figure class="card">
            <img src="assets/images/Image 01.png" alt="Imagem de robô">
            <figcaption>
               <span class="content-tag">Robótica</span>
               <h2 class="text-2xl">
                  Robôs domésticos começam a ser adotados para tarefas diárias, prometendo mais conforto e eficiência
                  nas residências.
               </h2>
            </figcaption>
         </figure>
         <div class="grid grid-column-2 gap-16">
            <figure class="card">
               <img src="assets/images/Image 02.png" alt="Imagem do celular">
               <figcaption>
                  <span class="content-tag">Hologramas</span>
                  <h2 class="text-l">
                     Novo Smartphone Projetor 3D chega ao mercado, transformando a forma como vemos nossas telas!
                  </h2>
               </figcaption>
            </figure>
            <figure class="card">
               <img src="assets/images/Image 03.png" alt="Imagem de 6G">
               <figcaption>
                  <span class="content-tag">Internet</span>
                  <h2 class="text-l">
                     Tecnologia 6G chega às metrópoles brasileiras, prometendo revolucionar a forma como vivemos e nos
                     comuni...
                  </h2>
               </figcaption>
            </figure>
            <figure class="card">
               <img src="assets/images/Image 04.png" alt="Imagem de mulher com smartphone">
               <figcaption>
                  <span class="content-tag">Vestíveis</span>
                  <h2 class="text-l">
                     Empresa lança relógio inteligente capaz de monitorar a saúde mental, oferecendo insights valiosos
                     para o...
                  </h2>
               </figcaption>
            </figure>
            <figure class="card">
               <img src="assets/images/Image 05.png" alt="Imagem de pessoas com óculos VR">
               <figcaption>
                  <span class="content-tag">Realidade Virtual</span>
                  <h2 class="text-l">
                     Escolas adotam a tecnologia VR para proporcionar experiências imersivas, transformando a
                     aprendizagem tradi...
                  </h2>
               </figcaption>
            </figure>
         </div>
      </section>
   </main>
</body>

</html>
